root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/orchd ./cmd/orchd"
entrypoint = ["./tmp/air/orchd"]
include_ext = ["go"]
exclude_dir = ["tmp", "storage", "ui", "node_modules", ".git"]
delay = 300
stop_on_error = false
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
