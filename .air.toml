root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/hopter ./cmd/hopter"
entrypoint = ["./tmp/air/hopter", "--port", "8787", "--dev-proxy-url", "http://127.0.0.1:5173"]
include_ext = ["go"]
exclude_dir = ["tmp", "storage", "ui", "node_modules", ".git"]
delay = 300
stop_on_error = false
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
