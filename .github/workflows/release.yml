name: Release

env:
  RELEASE_REPOSITORY: sorcererxw/hopter

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-release-scope:
    name: Detect Release Scope
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.scope.outputs.release_needed }}
      version: ${{ steps.version.outputs.version }}
      changed_files: ${{ steps.scope.outputs.changed_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect product-surface changes
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
            before="$(git rev-list --max-count=1 "${after}^" 2>/dev/null || true)"
          fi

          changed_file_list="$(mktemp)"

          if [[ -n "${before}" ]]; then
            git diff --name-only "${before}" "${after}" > "${changed_file_list}"
          else
            git show --pretty='' --name-only "${after}" > "${changed_file_list}"
          fi

          cat "${changed_file_list}"

          release_needed=false
          if grep -Eq '^(cmd/|internal/|idl/|ui/|scripts/|Makefile$|go\.mod$|go\.sum$|\.air\.toml$|\.goreleaser\.yml$|\.github/workflows/release\.yml$)' "${changed_file_list}"; then
            release_needed=true
          fi

          {
            echo "release_needed=${release_needed}"
            echo "changed_files<<EOF"
            cat "${changed_file_list}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Compute next 0.0.x version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(
            git ls-remote --tags --refs "https://github.com/${RELEASE_REPOSITORY}.git" 'v0.0.*' \
              | awk -F/ '{print $3}' \
              | sort -V \
              | tail -n 1
          )"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.0.1"
          else
            current_patch="${latest_tag##*.}"
            next_tag="v0.0.$((current_patch + 1))"
          fi

          echo "version=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "Next release tag: ${next_tag}"

  goreleaser-release:
    name: GoReleaser Release
    needs: detect-release-scope
    if: needs.detect-release-scope.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.detect-release-scope.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install UI dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build embedded UI dist
        run: pnpm --dir ui build

      - name: Create release tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${RELEASE_REPOSITORY}.git"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "refs/tags/${VERSION}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  publish-npm:
    name: Publish npm Packages
    needs:
      - detect-release-scope
      - goreleaser-release
    if: needs.detect-release-scope.outputs.release_needed == 'true' && needs.goreleaser-release.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.detect-release-scope.outputs.version }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Generate npm packages
        shell: bash
        run: |
          set -euo pipefail
          bash source/scripts/generate-npm-packages.sh \
            --version "${VERSION}" \
            --repo "${RELEASE_REPOSITORY}" \
            --output npm-packages

      - name: Publish npm packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          cd npm-packages/main
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already published."
            exit 0
          fi
          npm publish --access public --provenance
