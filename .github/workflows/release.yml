name: Release

env:
  RELEASE_REPOSITORY: sorcererxw/hopter

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-release-scope:
    name: Detect Release Scope
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.scope.outputs.release_needed }}
      version: ${{ steps.version.outputs.version }}
      changed_files: ${{ steps.scope.outputs.changed_files }}
      range_start: ${{ steps.scope.outputs.range_start }}
      range_end: ${{ steps.scope.outputs.range_end }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect product-surface changes
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
            before="$(git rev-list --max-count=1 "${after}^" 2>/dev/null || true)"
          fi

          changed_file_list="$(mktemp)"

          if [[ -n "${before}" ]]; then
            git diff --name-only "${before}" "${after}" > "${changed_file_list}"
          else
            git show --pretty='' --name-only "${after}" > "${changed_file_list}"
          fi

          cat "${changed_file_list}"

          release_needed=false
          if grep -Eq '^(cmd/|internal/|idl/|ui/|scripts/|Makefile$|go\.mod$|go\.sum$|\.air\.toml$)' "${changed_file_list}"; then
            release_needed=true
          fi

          {
            echo "release_needed=${release_needed}"
            echo "range_start=${before}"
            echo "range_end=${after}"
            echo "changed_files<<EOF"
            cat "${changed_file_list}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Compute next 0.0.x version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(
            git ls-remote --tags --refs "https://github.com/${RELEASE_REPOSITORY}.git" 'v0.0.*' \
              | awk -F/ '{print $3}' \
              | sort -V \
              | tail -n 1
          )"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.0.1"
          else
            current_patch="${latest_tag##*.}"
            next_tag="v0.0.$((current_patch + 1))"
          fi

          echo "version=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "Next release tag: ${next_tag}"

  build-release-assets:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: detect-release-scope
    if: needs.detect-release-scope.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install UI dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build embedded UI dist
        run: pnpm --dir ui build

      - name: Build release archive
        env:
          VERSION: ${{ needs.detect-release-scope.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail

          version_no_v="${VERSION#v}"
          archive_dir="release/${GOOS}-${GOARCH}"
          binary_name="hopter"
          binary_asset_name="hopter-${GOOS}-${GOARCH}"
          archive_name="hopter_${version_no_v}_${GOOS}_${GOARCH}.tar.gz"

          mkdir -p "${archive_dir}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${version_no_v} -X main.installSource=direct" \
              -o "${archive_dir}/${binary_name}" \
              ./cmd/hopter

          cp "${archive_dir}/${binary_name}" "release/${binary_asset_name}"
          tar -C "${archive_dir}" -czf "release/${archive_name}" "${binary_name}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            release/hopter-${{ matrix.goos }}-${{ matrix.goarch }}
            release/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - detect-release-scope
      - build-release-assets
    if: needs.detect-release-scope.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Generate checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release
            sha256sum hopter-* *.tar.gz > checksums.txt
          )

      - name: Write release notes
        shell: bash
        env:
          VERSION: ${{ needs.detect-release-scope.outputs.version }}
          RANGE_START: ${{ needs.detect-release-scope.outputs.range_start }}
          RANGE_END: ${{ needs.detect-release-scope.outputs.range_end }}
        run: |
          set -euo pipefail
          if [[ -n "${RANGE_START}" ]]; then
            commit_range="${RANGE_START}..${RANGE_END}"
          else
            commit_range="${RANGE_END}"
          fi

          commit_link_prefix="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit"
          commits="$(git log --pretty=format:"- [\`%h\`](${commit_link_prefix}/%H) %s" "${commit_range}" || true)"
          if [[ -z "${commits}" ]]; then
            commits="- No commits found for this release range."
          fi

          cat > release-notes.md <<EOF
          ## Release ${VERSION}

          **Repository:** ${GITHUB_REPOSITORY}
          **Branch:** ${GITHUB_REF_NAME}
          **Trigger SHA:** ${GITHUB_SHA}
          **Commit range:** ${commit_range}

          ### Commit history

          ${commits}
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPOSITORY }}
          tag_name: ${{ needs.detect-release-scope.outputs.version }}
          name: hopter ${{ needs.detect-release-scope.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            release/*
          token: ${{ secrets.RELEASE_TOKEN }}

  publish-homebrew-tap:
    name: Publish Homebrew Tap
    needs:
      - detect-release-scope
      - build-release-assets
      - publish-release
    if: needs.detect-release-scope.outputs.release_needed == 'true' && needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: sorcererxw/tap
      VERSION: ${{ needs.detect-release-scope.outputs.version }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: source/release

      - name: Generate checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          (
            cd source/release
            sha256sum hopter-* *.tar.gz > checksums.txt
          )

      - name: Update Homebrew tap formulae
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" tap
          bash source/scripts/generate-homebrew-formula.sh \
            --version "${VERSION}" \
            --repo "${RELEASE_REPOSITORY}" \
            --checksums source/release/checksums.txt \
            --output tap/Formula/hopter.rb

          (
            cd tap
            git add Formula/hopter.rb
            if git diff --cached --quiet; then
              echo "${HOMEBREW_TAP_REPOSITORY} formula already up to date."
              exit 0
            fi
            git commit -m "Update hopter to ${VERSION}"
            git push origin HEAD:main
          )
