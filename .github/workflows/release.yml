name: Release

env:
  RELEASE_REPOSITORY: sorcererxw/hopter

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-release-scope:
    name: Detect Release Scope
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.scope.outputs.release_needed }}
      version: ${{ steps.version.outputs.version }}
      changed_files: ${{ steps.scope.outputs.changed_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect product-surface changes
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
            before="$(git rev-list --max-count=1 "${after}^" 2>/dev/null || true)"
          fi

          changed_file_list="$(mktemp)"

          if [[ -n "${before}" ]]; then
            git diff --name-only "${before}" "${after}" > "${changed_file_list}"
          else
            git show --pretty='' --name-only "${after}" > "${changed_file_list}"
          fi

          cat "${changed_file_list}"

          release_needed=false
          if grep -Eq '^(cmd/|internal/|idl/|ui/|scripts/|Makefile$|go\.mod$|go\.sum$|\.air\.toml$)' "${changed_file_list}"; then
            release_needed=true
          fi

          {
            echo "release_needed=${release_needed}"
            echo "changed_files<<EOF"
            cat "${changed_file_list}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Compute next 0.0.x version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(
            git ls-remote --tags --refs "https://github.com/${RELEASE_REPOSITORY}.git" 'v0.0.*' \
              | awk -F/ '{print $3}' \
              | sort -V \
              | tail -n 1
          )"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.0.1"
          else
            current_patch="${latest_tag##*.}"
            next_tag="v0.0.$((current_patch + 1))"
          fi

          echo "version=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "Next release tag: ${next_tag}"

  build-release-assets:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: detect-release-scope
    if: needs.detect-release-scope.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install UI dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build embedded UI dist
        run: pnpm --dir ui build

      - name: Build release archive
        env:
          VERSION: ${{ needs.detect-release-scope.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail

          version_no_v="${VERSION#v}"
          archive_dir="release/${GOOS}-${GOARCH}"
          binary_name="hopter"
          binary_asset_name="hopter-${GOOS}-${GOARCH}"
          archive_name="hopter_${version_no_v}_${GOOS}_${GOARCH}.tar.gz"

          mkdir -p "${archive_dir}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${version_no_v} -X main.installSource=direct" \
              -o "${archive_dir}/${binary_name}" \
              ./cmd/hopter

          cp "${archive_dir}/${binary_name}" "release/${binary_asset_name}"
          tar -C "${archive_dir}" -czf "release/${archive_name}" "${binary_name}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            release/hopter-${{ matrix.goos }}-${{ matrix.goarch }}
            release/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - detect-release-scope
      - build-release-assets
    if: needs.detect-release-scope.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Generate checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release
            sha256sum hopter-* *.tar.gz > checksums.txt
          )

      - name: Write release notes preamble
        shell: bash
        env:
          VERSION: ${{ needs.detect-release-scope.outputs.version }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Automated release for ${VERSION}.

          Published to ${RELEASE_REPOSITORY}.

          Triggered by product-surface changes from ${GITHUB_REPOSITORY} on ${GITHUB_REF_NAME} at ${GITHUB_SHA}.

          Changed files:
          ${{ needs.detect-release-scope.outputs.changed_files }}
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPOSITORY }}
          tag_name: ${{ needs.detect-release-scope.outputs.version }}
          name: hopter ${{ needs.detect-release-scope.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            release/*
          token: ${{ secrets.RELEASE_TOKEN }}

  publish-homebrew-tap:
    name: Publish Homebrew Tap
    needs:
      - detect-release-scope
      - build-release-assets
      - publish-release
    if: needs.detect-release-scope.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: sorcererxw/homebrew-hopter
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      VERSION: ${{ needs.detect-release-scope.outputs.version }}
    steps:
      - name: Skip when tap token is not configured
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap publish."

      - name: Check out source repository
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v4
        with:
          path: source

      - name: Download release archives
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: source/release

      - name: Generate checksum manifest
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          (
            cd source/release
            sha256sum hopter-* *.tar.gz > checksums.txt
          )

      - name: Check out Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Generate Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          bash source/scripts/generate-homebrew-formula.sh \
            --version "${VERSION}" \
            --repo "${RELEASE_REPOSITORY}" \
            --checksums source/release/checksums.txt \
            --output tap/Formula/hopter.rb

      - name: Commit Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hopter.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "Update hopter to ${VERSION}"
          git push
