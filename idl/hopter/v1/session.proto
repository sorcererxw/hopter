syntax = "proto3";

package hopter.v1;

import "google/protobuf/timestamp.proto";
import "hopter/v1/common.proto";

// TODO: set go_package once the Go module path is finalized.

service SessionService {
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc GetSessionMeta(GetSessionMetaRequest) returns (GetSessionMetaResponse);
  rpc GetSessionReview(GetSessionReviewRequest) returns (GetSessionReviewResponse);
  rpc GetSessionFile(GetSessionFileRequest) returns (GetSessionFileResponse);
  rpc ListSessionTranscript(ListSessionTranscriptRequest) returns (ListSessionTranscriptResponse);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc SendSessionInput(SendSessionInputRequest) returns (SendSessionInputResponse);
  rpc InterruptSession(InterruptSessionRequest) returns (InterruptSessionResponse);
  rpc RespondToSessionApproval(RespondToSessionApprovalRequest) returns (RespondToSessionApprovalResponse);
  rpc ListSessionArtifacts(ListSessionArtifactsRequest) returns (ListSessionArtifactsResponse);
}

message Session {
  string id = 1;
  string title = 2;
  ProjectRef project = 3;
  SessionStatus status = 4;
  string summary = 5;
  bool attention_required = 6;
  string attention_reason = 7;
  string last_input_hint = 8;
  google.protobuf.Timestamp updated_at = 9;
  repeated ArtifactRef artifacts = 10;
  repeated SessionTranscriptItem transcript_items = 11;
  string backend_key = 12;
  optional string pending_approval_id = 13;
}

message SessionMeta {
  string id = 1;
  string title = 2;
  ProjectRef project = 3;
  SessionStatus status = 4;
  string summary = 5;
  bool attention_required = 6;
  string attention_reason = 7;
  string last_input_hint = 8;
  google.protobuf.Timestamp updated_at = 9;
  repeated ArtifactRef artifacts = 10;
  string backend_key = 11;
  bool has_more_before = 12;
  uint32 latest_page_size_hint = 13;
  string resume_command = 14;
  optional string pending_approval_id = 15;
}

enum SessionTranscriptItemKind {
  SESSION_TRANSCRIPT_ITEM_KIND_UNSPECIFIED = 0;
  SESSION_TRANSCRIPT_ITEM_KIND_USER_MESSAGE = 1;
  SESSION_TRANSCRIPT_ITEM_KIND_AGENT_MESSAGE = 2;
  SESSION_TRANSCRIPT_ITEM_KIND_REASONING = 3;
  SESSION_TRANSCRIPT_ITEM_KIND_TOOL_CALL = 4;
  SESSION_TRANSCRIPT_ITEM_KIND_COMMAND_EXECUTION = 5;
  SESSION_TRANSCRIPT_ITEM_KIND_FILE_CHANGE = 6;
}

enum SessionTranscriptAttachmentKind {
  SESSION_TRANSCRIPT_ATTACHMENT_KIND_UNSPECIFIED = 0;
  SESSION_TRANSCRIPT_ATTACHMENT_KIND_IMAGE = 1;
  SESSION_TRANSCRIPT_ATTACHMENT_KIND_FILE = 2;
}

message SessionTranscriptAttachment {
  string id = 1;
  SessionTranscriptAttachmentKind kind = 2;
  string label = 3;
  string path = 4;
  string url = 5;
  string content_type = 6;
}

message SessionTranscriptItem {
  string id = 1;
  SessionTranscriptItemKind kind = 2;
  string title = 3;
  string body = 4;
  string status = 5;
  string display_body = 6;
  repeated SessionTranscriptAttachment attachments = 7;
  string order_key = 8;
}

message SessionListItem {
  string id = 1;
  string title = 2;
  ProjectRef project = 3;
  SessionStatus status = 4;
  google.protobuf.Timestamp updated_at = 5;
  bool attention_required = 6;
  string backend_key = 7;
}

message ListSessionsRequest {
  optional string project_id = 1;
  optional uint32 limit = 2;
}

message ListSessionsResponse {
  repeated SessionListItem sessions = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message GetSessionMetaRequest {
  string session_id = 1;
}

message GetSessionMetaResponse {
  SessionMeta session = 1;
}

message SessionReviewFile {
  string path = 1;
  string kind = 2;
  optional string move_path = 3;
  uint32 additions = 4;
  uint32 deletions = 5;
  string diff = 6;
  string display_label = 7;
}

message SessionReview {
  string session_id = 1;
  string project_id = 2;
  bool available = 3;
  string turn_id = 4;
  string reason = 5;
  string full_patch = 6;
  repeated SessionReviewFile files = 7;
  google.protobuf.Timestamp generated_at = 8;
  bool pending_turn_in_progress = 9;
}

message GetSessionReviewRequest {
  string session_id = 1;
}

message GetSessionReviewResponse {
  SessionReview review = 1;
}

message SessionFile {
  string session_id = 1;
  string project_id = 2;
  bool available = 3;
  string requested_path = 4;
  string canonical_path = 5;
  string display_path = 6;
  string content = 7;
  string reason = 8;
  bool truncated = 9;
  bool is_binary = 10;
  uint32 line_count = 11;
  uint32 initial_line = 12;
  uint32 initial_column = 13;
}

message GetSessionFileRequest {
  string session_id = 1;
  string path = 2;
  optional uint32 line = 3;
  optional uint32 column = 4;
}

message GetSessionFileResponse {
  SessionFile file = 1;
}

message ListSessionTranscriptRequest {
  string session_id = 1;
  optional string before_cursor = 2;
  optional uint32 limit = 3;
}

message SessionTranscriptPage {
  repeated SessionTranscriptItem items = 1;
  optional string next_before_cursor = 2;
  bool has_more_before = 3;
  google.protobuf.Timestamp snapshot_updated_at = 4;
}

message ListSessionTranscriptResponse {
  SessionTranscriptPage page = 1;
}

message CreateSessionRequest {
  string project_id = 1;
  optional string title = 2;
  string prompt = 3;
  optional string backend_key = 4;
  optional string model = 5;
  optional string reasoning_effort = 6;
  optional bool codex_fast_mode = 7;
  repeated SessionInputAttachment attachments = 8;
}

message CreateSessionResponse {
  Session session = 1;
}

message SendSessionInputRequest {
  string session_id = 1;
  string input = 2;
  optional string model = 3;
  optional string reasoning_effort = 4;
  optional bool codex_fast_mode = 5;
  repeated SessionInputAttachment attachments = 6;
}

message SendSessionInputResponse {
  bool accepted = 1;
  string session_id = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message SessionInputAttachment {
  string label = 1;
  string url = 2;
  string content_type = 3;
}

message InterruptSessionRequest {
  string session_id = 1;
}

message InterruptSessionResponse {
  bool accepted = 1;
  string session_id = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message RespondToSessionApprovalRequest {
  string session_id = 1;
  string approval_id = 2;
  ApprovalDecision decision = 3;
  optional string comment = 4;
}

message RespondToSessionApprovalResponse {
  bool accepted = 1;
  string session_id = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message ListSessionArtifactsRequest {
  string session_id = 1;
}

message ListSessionArtifactsResponse {
  repeated ArtifactRef artifacts = 1;
}
