syntax = "proto3";

package hopter.v1;

import "google/protobuf/timestamp.proto";
import "hopter/v1/common.proto";

// TODO: set go_package once the Go module path is finalized.

service HostService {
  rpc GetHostStatus(GetHostStatusRequest) returns (GetHostStatusResponse);
  rpc ListBackends(ListBackendsRequest) returns (ListBackendsResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc ListMCPServers(ListMCPServersRequest) returns (ListMCPServersResponse);
  rpc ListDirectoryRoots(ListDirectoryRootsRequest) returns (ListDirectoryRootsResponse);
  rpc ListDirectory(ListDirectoryRequest) returns (ListDirectoryResponse);
  rpc GetPathMetadata(GetPathMetadataRequest) returns (GetPathMetadataResponse);
  rpc ListRecentRepos(ListRecentReposRequest) returns (ListRecentReposResponse);
  rpc GetUpdateStatus(GetUpdateStatusRequest) returns (GetUpdateStatusResponse);
  rpc CheckForUpdate(CheckForUpdateRequest) returns (CheckForUpdateResponse);
  rpc ApplyUpdate(ApplyUpdateRequest) returns (ApplyUpdateResponse);
}

message BackendStatus {
  string backend_key = 1;
  bool available = 2;
  string version = 3;
  string reason = 4;
}

message HostStatus {
  string host_id = 1;
  HostStatusKind status = 2;
  repeated BackendStatus backends = 3;
  uint32 project_count = 4;
  uint32 session_count = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetHostStatusRequest {}

message GetHostStatusResponse {
  HostStatus host_status = 1;
}

enum InstallSource {
  INSTALL_SOURCE_UNSPECIFIED = 0;
  INSTALL_SOURCE_DIRECT = 1;
  INSTALL_SOURCE_UNKNOWN = 2;
  INSTALL_SOURCE_HOMEBREW_FORMULA = 3;
  INSTALL_SOURCE_HOMEBREW_CASK = 4;
  INSTALL_SOURCE_APT = 5;
  INSTALL_SOURCE_DNF = 6;
  INSTALL_SOURCE_WINGET = 7;
  INSTALL_SOURCE_NIX = 8;
  INSTALL_SOURCE_MACPORTS = 9;
  INSTALL_SOURCE_SNAP = 10;
  INSTALL_SOURCE_FLATPAK = 11;
}

enum UpdatePolicy {
  UPDATE_POLICY_UNSPECIFIED = 0;
  UPDATE_POLICY_SELF_MANAGED = 1;
  UPDATE_POLICY_PACKAGE_MANAGED = 2;
  UPDATE_POLICY_STORE_MANAGED = 3;
}

enum UpdateState {
  UPDATE_STATE_UNSPECIFIED = 0;
  UPDATE_STATE_IDLE = 1;
  UPDATE_STATE_CHECKING = 2;
  UPDATE_STATE_AVAILABLE = 3;
  UPDATE_STATE_DOWNLOADING = 4;
  UPDATE_STATE_VERIFYING = 5;
  UPDATE_STATE_PREFLIGHT_RUNNING = 6;
  UPDATE_STATE_READY_TO_APPLY = 7;
  UPDATE_STATE_REEXECING = 8;
  UPDATE_STATE_FAILED_PRE_EXEC = 9;
  UPDATE_STATE_FAILED_POST_EXEC_UNKNOWN = 10;
}

message AvailableUpdate {
  string version = 1;
  string notes_url = 2;
  google.protobuf.Timestamp published_at = 3;
}

message UpdateStatus {
  string current_version = 1;
  string current_commit = 2;
  string channel = 3;
  InstallSource install_source = 4;
  UpdatePolicy update_policy = 5;
  UpdateState state = 6;
  bool update_available = 7;
  AvailableUpdate available_update = 8;
  string target_version = 9;
  string upgrade_command_hint = 10;
  string failure_reason = 11;
  google.protobuf.Timestamp last_checked_at = 12;
}

message GetUpdateStatusRequest {}

message GetUpdateStatusResponse {
  UpdateStatus update_status = 1;
}

message CheckForUpdateRequest {
  bool force = 1;
}

message CheckForUpdateResponse {
  UpdateStatus update_status = 1;
}

message ApplyUpdateRequest {}

message ApplyUpdateResponse {
  UpdateStatus update_status = 1;
}

message ListBackendsRequest {}

message ListBackendsResponse {
  repeated BackendStatus backends = 1;
}

message ModelReasoningEffort {
  string reasoning_effort = 1;
  string description = 2;
}

message AgentModel {
  string id = 1;
  string model = 2;
  string display_name = 3;
  string description = 4;
  bool is_default = 5;
  string default_reasoning_effort = 6;
  repeated ModelReasoningEffort supported_reasoning_efforts = 7;
  repeated string input_modalities = 8;
}

message ListModelsRequest {
  optional string backend_key = 1;
  bool include_hidden = 2;
}

message ListModelsResponse {
  repeated AgentModel models = 1;
}

message SkillSummary {
  string name = 1;
  string reference = 2;
  string description = 3;
  string source = 4;
}

message ListSkillsRequest {}

message ListSkillsResponse {
  repeated SkillSummary skills = 1;
}

message MCPServerSummary {
  string name = 1;
  string source = 2;
  string configuration_status = 3;
}

message ListMCPServersRequest {}

message ListMCPServersResponse {
  repeated MCPServerSummary servers = 1;
}

message DirectoryRoot {
  string label = 1;
  string path = 2;
  string kind = 3;
}

message DirectoryEntry {
  string name = 1;
  string path = 2;
  bool is_directory = 3;
  bool is_repo = 4;
  bool has_children = 5;
  bool is_allowed = 6;
}

message DirectoryListing {
  string current_path = 1;
  string parent_path = 2;
  repeated DirectoryEntry entries = 3;
}

message PathMetadata {
  string path = 1;
  string canonical_path = 2;
  string basename = 3;
  bool is_directory = 4;
  bool is_repo = 5;
  bool is_allowed = 6;
  uint32 child_directory_count = 7;
  uint32 child_file_count = 8;
  google.protobuf.Timestamp modified_at = 9;
}

message ListDirectoryRootsRequest {}

message ListDirectoryRootsResponse {
  repeated DirectoryRoot roots = 1;
}

message ListDirectoryRequest {
  string path = 1;
}

message ListDirectoryResponse {
  DirectoryListing listing = 1;
}

message GetPathMetadataRequest {
  string path = 1;
}

message GetPathMetadataResponse {
  PathMetadata metadata = 1;
}

message ListRecentReposRequest {
  uint32 limit = 1;
}

message ListRecentReposResponse {
  repeated PathMetadata repos = 1;
}
