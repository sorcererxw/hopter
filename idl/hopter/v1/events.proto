syntax = "proto3";

package hopter.v1;

import "google/protobuf/timestamp.proto";
import "hopter/v1/common.proto";
import "hopter/v1/session.proto";

// TODO: set go_package once the Go module path is finalized.

enum WorkspaceEventType {
  WORKSPACE_EVENT_TYPE_UNSPECIFIED = 0;
  WORKSPACE_EVENT_TYPE_HOST_STATUS_CHANGED = 1;
  WORKSPACE_EVENT_TYPE_PROJECTS_CHANGED = 2;
  WORKSPACE_EVENT_TYPE_SESSIONS_CHANGED = 3;
  WORKSPACE_EVENT_TYPE_SESSION_CHANGED = 4;
  WORKSPACE_EVENT_TYPE_SESSION_ARTIFACTS_CHANGED = 5;
  WORKSPACE_EVENT_TYPE_CONFIG_CHANGED = 6;
  WORKSPACE_EVENT_TYPE_GIT_CHANGED = 7;
  WORKSPACE_EVENT_TYPE_TASKS_CHANGED = 8;
  WORKSPACE_EVENT_TYPE_TASK_CHANGED = 9;
  WORKSPACE_EVENT_TYPE_TASK_ATTENTION_REQUIRED = 10;
}

enum SessionLivePatchKind {
  SESSION_LIVE_PATCH_KIND_UNSPECIFIED = 0;
  SESSION_LIVE_PATCH_KIND_STATUS = 1;
  SESSION_LIVE_PATCH_KIND_DRAFT_DELTA = 2;
  SESSION_LIVE_PATCH_KIND_MESSAGE_FINALIZED = 3;
  SESSION_LIVE_PATCH_KIND_RECONCILE_REQUIRED = 4;
}

message SessionLivePatch {
  SessionLivePatchKind kind = 1;
  string active_turn_id = 2;
  string draft_item_id = 3;
  string draft_delta = 4;
  SessionTranscriptItem final_item = 5;
  SessionStatus status = 6;
  string summary = 7;
  bool requires_refetch = 8;
}

message WorkspaceEventPayload {
  RefreshHint refresh_hint = 1;
  string summary = 2;
  SessionLivePatch session_live_patch = 3;
}

message WorkspaceEvent {
  string id = 1;
  WorkspaceEventType type = 2;
  google.protobuf.Timestamp occurred_at = 3;
  optional string project_id = 4;
  optional string session_id = 5;
  WorkspaceEventPayload payload = 6;
  optional string task_id = 7;
}
