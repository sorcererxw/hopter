syntax = "proto3";

package orchd.v1;

import "google/protobuf/timestamp.proto";
import "orchd/v1/common.proto";

// TODO: set go_package once the Go module path is finalized.

service SessionService {
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc SendSessionInput(SendSessionInputRequest) returns (SendSessionInputResponse);
  rpc RespondToSessionApproval(RespondToSessionApprovalRequest) returns (RespondToSessionApprovalResponse);
  rpc ListSessionArtifacts(ListSessionArtifactsRequest) returns (ListSessionArtifactsResponse);
}

message Session {
  string id = 1;
  string title = 2;
  ProjectRef project = 3;
  SessionStatus status = 4;
  string summary = 5;
  bool attention_required = 6;
  string attention_reason = 7;
  string last_input_hint = 8;
  google.protobuf.Timestamp updated_at = 9;
  repeated ArtifactRef artifacts = 10;
  repeated SessionTranscriptItem transcript_items = 11;
}

enum SessionTranscriptItemKind {
  SESSION_TRANSCRIPT_ITEM_KIND_UNSPECIFIED = 0;
  SESSION_TRANSCRIPT_ITEM_KIND_USER_MESSAGE = 1;
  SESSION_TRANSCRIPT_ITEM_KIND_AGENT_MESSAGE = 2;
  SESSION_TRANSCRIPT_ITEM_KIND_REASONING = 3;
  SESSION_TRANSCRIPT_ITEM_KIND_TOOL_CALL = 4;
  SESSION_TRANSCRIPT_ITEM_KIND_COMMAND_EXECUTION = 5;
  SESSION_TRANSCRIPT_ITEM_KIND_FILE_CHANGE = 6;
}

message SessionTranscriptItem {
  string id = 1;
  SessionTranscriptItemKind kind = 2;
  string title = 3;
  string body = 4;
  string status = 5;
}

message SessionListItem {
  string id = 1;
  string title = 2;
  ProjectRef project = 3;
  SessionStatus status = 4;
  google.protobuf.Timestamp updated_at = 5;
  bool attention_required = 6;
}

message ListSessionsRequest {
  optional string project_id = 1;
  optional uint32 limit = 2;
}

message ListSessionsResponse {
  repeated SessionListItem sessions = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message CreateSessionRequest {
  string project_id = 1;
  optional string title = 2;
  string prompt = 3;
}

message CreateSessionResponse {
  Session session = 1;
}

message SendSessionInputRequest {
  string session_id = 1;
  string input = 2;
}

message SendSessionInputResponse {
  bool accepted = 1;
  string session_id = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message RespondToSessionApprovalRequest {
  string session_id = 1;
  string approval_id = 2;
  ApprovalDecision decision = 3;
  optional string comment = 4;
}

message RespondToSessionApprovalResponse {
  bool accepted = 1;
  string session_id = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message ListSessionArtifactsRequest {
  string session_id = 1;
}

message ListSessionArtifactsResponse {
  repeated ArtifactRef artifacts = 1;
}
